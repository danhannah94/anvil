name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Update npm (pinned to npm 10.x for OIDC trusted publishing)
        run: npm install -g npm@10

      - run: npm ci

      - run: npm run build

      # Tests skipped in CI — sqlite-vss native extension requires platform-specific build.
      # Tests run locally before version bump.
      # TODO: Add CI test workflow with sqlite-vss prebuilt binaries.

      - run: npm publish --provenance --access public
